services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: technical-docs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: technical-docs-app
    depends_on:
      - qdrant
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./logs:/app/logs
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_storage:
